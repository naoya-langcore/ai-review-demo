<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI審査システム</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN','Meiryo',sans-serif;color:#333;background:#f5f6f7;font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}

.k-header{height:48px;background:#fff;border-bottom:1px solid #e3e7ee;display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:100}
.k-header-bar{position:absolute;top:0;left:0;right:0;height:4px;background:#3498db}
.k-header-title{font-size:16px;font-weight:700;color:#333;margin-left:8px}
.k-header-sub{font-size:12px;color:#999;margin-left:12px}
.k-back{background:none;border:none;cursor:pointer;font-size:20px;color:#3498db;padding:4px 8px;margin-right:4px}

.k-nav{height:40px;background:#f5f6f7;border-bottom:1px solid #e3e7ee;display:flex;align-items:center;padding:0 16px;gap:8px}
.k-nav-btn{background:#fff;border:1px solid #e3e7ee;border-radius:4px;padding:6px 14px;font-size:12px;cursor:pointer;color:#333;font-weight:500}
.k-nav-btn:hover{background:#e8f4fd;border-color:#3498db}
.k-nav-btn.primary{background:#3498db;color:#fff;border-color:#3498db}
.k-nav-btn.primary:hover{background:#2980b9}
.k-nav-btn:disabled{opacity:0.5;cursor:default}

.k-table{width:100%;border-collapse:collapse;background:#fff;font-size:13px}
.k-table thead th{background:#f5f6f7;border:1px solid #e3e7ee;padding:8px 12px;text-align:left;font-weight:600;color:#666;font-size:11px;white-space:nowrap;position:sticky;top:48px;z-index:10}
.k-table tbody td{border:1px solid #e3e7ee;padding:8px 12px;color:#333}
.k-table tbody tr{cursor:pointer}
.k-table tbody tr:hover{background:#e8f4fd}
.k-table .row-num{width:40px;text-align:center;color:#999;background:#fafbfc}
.k-table .row-highlight{background:#fff8e1}

.k-detail{max-width:1280px;margin:0 auto;padding:16px}
.k-detail-header{background:#fff;border:1px solid #e3e7ee;border-radius:4px;padding:16px 20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.k-group{background:#fff;border:1px solid #e3e7ee;border-radius:4px;margin-bottom:10px;overflow:hidden}
.k-group-header{background:#f5f6f7;border-bottom:1px solid #e3e7ee;padding:10px 16px;font-size:13px;font-weight:700;color:#333;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none}
.k-group-header:hover{background:#eef0f3}
.k-group-body{padding:0}
.k-field-row{display:flex;border-bottom:1px solid #f0f1f4}
.k-field-row:last-child{border-bottom:none}
.k-field-label{width:180px;min-width:180px;background:#fafbfc;padding:10px 14px;font-size:12px;color:#666;font-weight:500;border-right:1px solid #f0f1f4;display:flex;align-items:center}
.k-field-value{flex:1;padding:10px 14px;font-size:13px;color:#333}
.k-field-warn .k-field-label{color:#e67e22;background:#fef9f0}
.k-field-warn .k-field-value{color:#d35400;background:#fef9f0;font-weight:600}

.k-status{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600}
.k-status-pending{background:#f0f1f4;color:#999}
.k-status-reviewing{background:#e8f4fd;color:#2980b9}
.k-status-approved{background:#eafaf1;color:#27ae60}
.k-status-rejected{background:#fdf0ef;color:#e74c3c}

.k-flag{font-size:10px;padding:1px 6px;border-radius:3px;background:#fdf0ef;color:#c0392b;font-weight:600}

.k-result-divider{display:flex;align-items:center;gap:10px;margin:20px 0 14px}
.k-result-divider .line{flex:1;height:1px;background:#e3e7ee}
.k-result-divider .label{padding:6px 16px;background:#e8f4fd;border-radius:20px;font-size:12px;font-weight:700;color:#2980b9}

.k-finding{padding:10px 14px;margin-bottom:6px;background:#fff;border-radius:4px;border-left:3px solid #ccc}
.k-finding-error{border-left-color:#e74c3c}
.k-finding-warning{border-left-color:#f39c12}
.k-finding-info{border-left-color:#3498db}

.k-progress{background:#fff;border:1px solid #bde0fe;border-radius:4px;padding:14px 18px;margin-bottom:12px}
.k-progress-bar{width:100%;height:4px;background:#e3e7ee;border-radius:2px;overflow:hidden;margin-top:8px}
.k-progress-fill{height:100%;background:linear-gradient(90deg,#3498db,#2980b9);border-radius:2px;transition:width 0.3s}

.k-score{text-align:center;padding:16px;background:#fff;border:2px solid #e3e7ee;border-radius:4px;min-width:100px}
.k-score-num{font-size:32px;font-weight:800;color:#27ae60}
.k-score-num.warn{color:#e67e22}

.k-filter{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fff;border-bottom:1px solid #e3e7ee}
.k-select{padding:5px 10px;border-radius:4px;border:1px solid #e3e7ee;font-size:12px;background:#fff}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useMemo} = React;

const SCHOOLS=["○○学園中学校","△△中学校","□□学院中学校"];

// データ生成ヘルパー
const mk=(id,si,sLn,sFn,sLk,sFk,sBd,gr,ey,em,aLn,aFn,aLk,aFk,rel,addr,bBk,bBr,bNo,bHk,tA,enSt,subA)=>({
  id,schoolIdx:si,
  student:{lastName:sLn,firstName:sFn,lastNameKana:sLk,firstNameKana:sFk,birthDate:sBd,grade:gr,enrollYear:ey,enrollMonth:em},
  applicant:{lastName:aLn,firstName:aFn,lastNameKana:aLk,firstNameKana:aFk,relationship:rel,address:addr},
  bank:{bankName:bBk,branchName:bBr,accountNumber:bNo,holderKana:bHk},
  tuition:{annual:tA},
  enrollment:{status:enSt},
  subsidy:{amount:subA}
});

const allApps=[
  // R07-0001: 正常（○○学園中学校）
  mk("R07-0001",0,"佐藤","美咲","サトウ","ミサキ","2009-04-15",3,2022,4,"佐藤","健一","サトウ","ケンイチ","父","東京都渋谷区神宮前2-3-4","みずほ銀行","渋谷支店","1234567","サトウ ケンイチ",420000,"在籍中",100000),
  // R07-0002: 正常（○○学園中学校）
  mk("R07-0002",0,"高橋","さくら","タカハシ","サクラ","2009-09-03",3,2022,4,"高橋","誠","タカハシ","マコト","父","東京都渋谷区広尾1-2-3","三菱UFJ銀行","広尾支店","2345678","タカハシ マコト",420000,"在籍中",100000),
  // R07-0003: 正常（△△中学校）
  mk("R07-0003",1,"吉田","陽菜","ヨシダ","ハルナ","2010-07-22",2,2023,4,"吉田","浩二","ヨシダ","コウジ","父","東京都新宿区新宿3-4-5","三井住友銀行","新宿支店","3456789","ヨシダ コウジ",396000,"在籍中",100000),
  // R07-0004: 正常（□□学院中学校）
  mk("R07-0004",2,"山本","蒼","ヤマモト","アオ","2011-07-08",1,2024,4,"山本","智子","ヤマモト","トモコ","母","東京都港区芝5-6-7","りそな銀行","芝支店","4567890","ヤマモト トモコ",480000,"在籍中",120000),
  // R07-0005: 授業料外れ値 35,000円 + 助成額が授業料超過（○○学園中学校）
  mk("R07-0005",0,"伊藤","蓮","イトウ","レン","2009-11-30",3,2022,4,"伊藤","直美","イトウ","ナオミ","母","東京都渋谷区渋谷1-2-3","みずほ銀行","渋谷支店","5678901","イトウ ナオミ",35000,"在籍中",100000),
  // R07-0006: 重複申請・母（△△中学校）加藤大翔
  mk("R07-0006",1,"加藤","大翔","カトウ","ヒロト","2009-08-18",3,2022,4,"加藤","明美","カトウ","アケミ","母","東京都豊島区南大塚2-5-8","三菱UFJ銀行","池袋支店","6789012","カトウ アケミ",396000,"在籍中",100000),
  // R07-0007: 重複申請・父（△△中学校）加藤大翔
  mk("R07-0007",1,"加藤","大翔","カトウ","ヒロト","2009-08-18",3,2022,4,"加藤","太郎","カトウ","タロウ","父","東京都豊島区南大塚2-5-8","三菱UFJ銀行","池袋支店","7890123","カトウ タロウ",396000,"在籍中",100000),
  // R07-0008: 姓不一致（○○学園中学校）生徒:鈴木 / 申請者:山田
  mk("R07-0008",0,"鈴木","翔太","スズキ","ショウタ","2010-05-14",2,2023,4,"山田","裕子","ヤマダ","ユウコ","母","東京都渋谷区上原4-7-2","三井住友銀行","代々木支店","8901234","ヤマダ ユウコ",420000,"在籍中",100000),
  // R07-0009: 正常（△△中学校）
  mk("R07-0009",1,"中村","悠真","ナカムラ","ユウマ","2010-06-11",2,2023,4,"中村","真理子","ナカムラ","マリコ","母","東京都豊島区西池袋1-3-7","りそな銀行","池袋支店","9012345","ナカムラ マリコ",396000,"在籍中",100000),
  // R07-0010: 正常（□□学院中学校）
  mk("R07-0010",2,"松本","陽向","マツモト","ヒナタ","2011-06-25",1,2024,4,"松本","恵","マツモト","メグミ","母","東京都港区麻布十番2-1-4","三菱UFJ銀行","麻布支店","0123456","マツモト メグミ",480000,"在籍中",120000),
];

const stCls={"未審査":"k-status-pending","審査中":"k-status-reviewing","承認":"k-status-approved","差戻し":"k-status-rejected"};

function App(){
  const[page,setPage]=useState("dash");
  const[schoolFilter,setSchoolFilter]=useState("");
  const[schoolIdx,setSchoolIdx]=useState(null);
  const[selApp,setSelApp]=useState(null);
  const[appStates,setAppStates]=useState(()=>Object.fromEntries(allApps.map(a=>[a.id,{status:"未審査",flag:"",result:null}])));
  const[reviewing,setReviewing]=useState(false);
  const[progress,setProgress]=useState(0);
  const[error,setError]=useState(null);
  const[schResult,setSchResult]=useState(null);
  const[schReviewing,setSchReviewing]=useState(false);
  const[schProgress,setSchProgress]=useState(0);
  const filtered=useMemo(()=>schoolFilter?allApps.filter(a=>SCHOOLS[a.schoolIdx]===schoolFilter):allApps,[schoolFilter]);
  const schoolApps=useMemo(()=>schoolIdx!==null?allApps.filter(a=>a.schoolIdx===schoolIdx):[],[schoolIdx]);
  const curState=selApp?appStates[selApp.id]:null;

  const goSchool=(idx)=>{setSchoolIdx(idx);setSchResult(null);setPage("school")};
  const goDetail=(app)=>{setSelApp(app);setPage("detail")};
  const goBack=()=>{if(page==="detail"){schoolIdx!==null?setPage("school"):setPage("dash")}else{setPage("dash");setSchoolIdx(null)}};

  // 単体AI審査
  const runSingle=useCallback(async()=>{
    if(!selApp)return;setReviewing(true);setProgress(10);setError(null);
    setAppStates(p=>({...p,[selApp.id]:{...p[selApp.id],status:"審査中"}}));
    const intv=setInterval(()=>setProgress(p=>Math.min(p+8,85)),500);
    try{
      const applicationData={
        受付番号:selApp.id,
        学校名:SCHOOLS[selApp.schoolIdx],
        生徒姓:selApp.student.lastName,生徒名:selApp.student.firstName,生徒姓カナ:selApp.student.lastNameKana,生徒名カナ:selApp.student.firstNameKana,
        生年月日:selApp.student.birthDate,学年:selApp.student.grade,入学年:selApp.student.enrollYear,入学月:selApp.student.enrollMonth,
        申請者姓:selApp.applicant.lastName,申請者名:selApp.applicant.firstName,申請者姓カナ:selApp.applicant.lastNameKana,申請者名カナ:selApp.applicant.firstNameKana,
        続柄:selApp.applicant.relationship,住所:selApp.applicant.address,
        銀行名:selApp.bank.bankName,支店名:selApp.bank.branchName,口座番号:selApp.bank.accountNumber,口座名義カナ:selApp.bank.holderKana,
        在籍確認:selApp.enrollment.status,年間授業料:selApp.tuition.annual,助成額:selApp.subsidy.amount
      };
      const res=await fetch('/api/review',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({applicationData})});
      clearInterval(intv);setProgress(100);
      if(!res.ok){const e=await res.json();throw new Error(e.error||'API error')}
      const result=await res.json();
      const flagText=(result.findings||[]).filter(f=>f.severity==="error").map(f=>f.category).join("、")||(result.findings||[]).filter(f=>f.severity==="warning").map(f=>f.category).join("、")||"";
      setAppStates(p=>({...p,[selApp.id]:{status:result.overall==="OK"?"承認":"差戻し",flag:flagText,result}}));
    }catch(err){clearInterval(intv);setError(err.message);setAppStates(p=>({...p,[selApp.id]:{...p[selApp.id],status:"未審査"}}));}
    setReviewing(false);setProgress(0);
    setTimeout(()=>document.getElementById("res")?.scrollIntoView({behavior:"smooth"}),200);
  },[selApp]);

  // 横断AI審査（学校単位）
  const runSchool=useCallback(async()=>{
    setSchReviewing(true);setSchProgress(10);setError(null);
    const intv=setInterval(()=>setSchProgress(p=>Math.min(p+6,85)),500);
    try{
      const apps=schoolApps.map(a=>({受付番号:a.id,生徒姓:a.student.lastName,生徒名:a.student.firstName,生年月日:a.student.birthDate,申請者姓:a.applicant.lastName,申請者名:a.applicant.firstName,続柄:a.applicant.relationship,在籍確認:a.enrollment.status,年間授業料:a.tuition.annual,助成額:a.subsidy.amount}));
      const res=await fetch('/api/review-school',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({schoolName:SCHOOLS[schoolIdx],applications:apps})});
      clearInterval(intv);setSchProgress(100);
      if(!res.ok){const e=await res.json();throw new Error(e.error||'API error')}
      const result=await res.json();
      const flaggedIds={};
      (result.issues||[]).forEach(issue=>(issue.ids||[]).forEach(id=>{flaggedIds[id]=(flaggedIds[id]||[]).concat(issue.title)}));
      setAppStates(p=>{const n={...p};Object.entries(flaggedIds).forEach(([id,titles])=>{n[id]={...n[id],flag:titles.join("、")}});return n});
      setSchResult(result.issues||[]);
    }catch(err){clearInterval(intv);setError(err.message)}
    setSchReviewing(false);setSchProgress(0);
  },[schoolApps,schoolIdx]);

  return(
    <div style={{minHeight:"100vh",background:"#f5f6f7"}}>
      <div className="k-header">
        <div className="k-header-bar"/>
        {page!=="dash"&&<button className="k-back" onClick={goBack}>&#8249;</button>}
        <span className="k-header-title">AI審査システム</span>
        <span className="k-header-sub">
          {page==="dash"&&"レコード一覧"}
          {page==="school"&&SCHOOLS[schoolIdx]}
          {page==="detail"&&`${selApp?.student.lastName}${selApp?.student.firstName}（${selApp?.id}）`}
        </span>
      </div>

      {/* DASHBOARD */}
      {page==="dash"&&<>
        <div className="k-filter">
          <span style={{fontSize:12,color:"#666"}}>絞り込み：</span>
          <select className="k-select" value={schoolFilter} onChange={e=>setSchoolFilter(e.target.value)}>
            <option value="">すべて（{allApps.length}件）</option>
            {SCHOOLS.map(s=><option key={s} value={s}>{s}（{allApps.filter(a=>SCHOOLS[a.schoolIdx]===s).length}件）</option>)}
          </select>
          {schoolFilter&&<button className="k-nav-btn" onClick={()=>goSchool(SCHOOLS.indexOf(schoolFilter))}>グループ審査 →</button>}
          <span style={{flex:1}}/>
          <span style={{fontSize:12,color:"#999"}}>{filtered.length}件</span>
        </div>
        <div>
          <table className="k-table">
            <thead><tr><th className="row-num">#</th><th>ステータス</th><th>受付番号</th><th>学校名</th><th>生徒名</th><th>申請者名</th><th>在籍確認</th><th>年間授業料</th><th>助成額</th><th>審査フラグ</th></tr></thead>
            <tbody>{filtered.map((a,i)=>{const st=appStates[a.id];return(
              <tr key={a.id} onClick={()=>goDetail(a)}>
                <td className="row-num">{i+1}</td>
                <td><span className={`k-status ${stCls[st.status]}`}>{st.status}</span></td>
                <td style={{fontWeight:600,color:"#3498db"}}>{a.id}</td>
                <td>{SCHOOLS[a.schoolIdx]}</td>
                <td style={{fontWeight:500}}>{a.student.lastName} {a.student.firstName}</td>
                <td>{a.applicant.lastName} {a.applicant.firstName}</td>
                <td style={{color:a.enrollment.status!=="在籍中"?"#c0392b":"#333",fontWeight:a.enrollment.status!=="在籍中"?700:400}}>{a.enrollment.status}</td>
                <td style={{textAlign:"right"}}>{a.tuition.annual.toLocaleString()}円</td>
                <td style={{textAlign:"right"}}>{a.subsidy.amount.toLocaleString()}円</td>
                <td>{st.flag?<span className="k-flag">{st.flag}</span>:<span style={{color:"#ccc"}}>—</span>}</td>
              </tr>)})}</tbody>
          </table>
        </div>
      </>}

      {/* SCHOOL */}
      {page==="school"&&<>
        <div className="k-nav">
          <span style={{fontWeight:700}}>{SCHOOLS[schoolIdx]}</span>
          <span style={{fontSize:12,color:"#999"}}>（{schoolApps.length}件）</span>
          <span style={{flex:1}}/>
          <button className="k-nav-btn primary" onClick={runSchool} disabled={schReviewing}>{schReviewing?"グループ審査中...":"グループ審査"}</button>
        </div>
        <div>
          <table className="k-table">
            <thead><tr><th className="row-num">#</th><th>ステータス</th><th>受付番号</th><th>生徒名</th><th>学年</th><th>申請者</th><th>続柄</th><th>在籍確認</th><th>年間授業料</th><th>助成額</th><th>審査フラグ</th></tr></thead>
            <tbody>{schoolApps.map((a,i)=>{const st=appStates[a.id];const isO=schResult?.some(r=>r.type==="tuition_outlier"&&r.ids?.includes(a.id));const isD=schResult?.some(r=>r.type==="duplicate"&&r.ids?.includes(a.id));const isE=schResult?.some(r=>r.type==="enrollment_issue"&&r.ids?.includes(a.id));return(
              <tr key={a.id} onClick={()=>goDetail(a)} className={(isO||isD||isE)?"row-highlight":""}>
                <td className="row-num">{i+1}</td>
                <td><span className={`k-status ${stCls[st.status]}`}>{st.status}</span></td>
                <td style={{fontWeight:600,color:"#3498db"}}>{a.id}</td>
                <td style={{fontWeight:500}}>{a.student.lastName} {a.student.firstName}{isD&&<span className="k-flag" style={{marginLeft:4}}>重複</span>}</td>
                <td>{a.student.grade}年</td>
                <td>{a.applicant.lastName} {a.applicant.firstName}</td>
                <td>{a.applicant.relationship}</td>
                <td style={{color:a.enrollment.status!=="在籍中"?"#c0392b":"#333",fontWeight:a.enrollment.status!=="在籍中"?700:400}}>{a.enrollment.status}{isE&&<span className="k-flag" style={{marginLeft:4}}>要確認</span>}</td>
                <td style={{fontWeight:isO?700:400,color:isO?"#c0392b":"#333",textAlign:"right"}}>{a.tuition.annual.toLocaleString()}円{isO&&<span className="k-flag" style={{marginLeft:4}}>外れ値</span>}</td>
                <td style={{textAlign:"right"}}>{a.subsidy.amount.toLocaleString()}円</td>
                <td>{st.flag?<span className="k-flag">{st.flag}</span>:"—"}</td>
              </tr>)})}</tbody>
          </table>
        </div>
        {schReviewing&&<div className="k-progress" style={{margin:16}}><div style={{display:"flex",alignItems:"center",gap:8}}><Sp/><span style={{fontSize:12,fontWeight:600,color:"#2980b9"}}>OpenAI APIでグループ審査中...</span></div><div className="k-progress-bar"><div className="k-progress-fill" style={{width:`${schProgress}%`}}/></div></div>}
        {error&&!schReviewing&&<div style={{margin:16,background:"#fdf0ef",border:"1px solid #f5b7b1",borderRadius:4,padding:12,color:"#c0392b",fontSize:12}}>エラー：{error}</div>}
        {schResult&&!schReviewing&&<div style={{padding:16}}>
          <div className="k-result-divider"><div className="line"/><div className="label">グループ審査結果</div><div className="line"/></div>
          {schResult.length===0?<div className="k-group" style={{padding:16,color:"#27ae60",fontWeight:600}}>問題は検出されませんでした。</div>:schResult.map((is,i)=><div key={i} className="k-finding k-finding-error" style={{margin:"0 0 8px"}}><div style={{fontWeight:700,marginBottom:4}}><span className="k-flag" style={{marginRight:6}}>要確認</span>{is.title}</div><div style={{fontSize:12,lineHeight:1.7,color:"#555"}}>{is.message}</div><div style={{marginTop:4,fontSize:11,color:"#999"}}>該当：{(is.ids||[]).map(id=><span key={id} className="k-flag" style={{marginRight:3}}>{id}</span>)}</div></div>)}
        </div>}
      </>}

      {/* DETAIL */}
      {page==="detail"&&selApp&&<div className="k-detail">
        <div className="k-detail-header">
          <div>
            <div style={{fontSize:18,fontWeight:700}}>{selApp.student.lastName} {selApp.student.firstName}<span style={{fontSize:12,color:"#999",marginLeft:8,fontWeight:400}}>{selApp.id}</span></div>
            <div style={{fontSize:12,color:"#999",marginTop:2}}>{SCHOOLS[selApp.schoolIdx]}　{selApp.student.grade}年</div>
          </div>
          <button className="k-nav-btn primary" onClick={runSingle} disabled={reviewing}>{reviewing?"審査中...":"AI審査を実行"}</button>
        </div>

        <div style={{display:"flex",gap:16,alignItems:"flex-start"}}>
          {/* 左カラム：申請データ */}
          <div style={{flex:1,minWidth:0}}>
            <KGroup title="生徒情報" fields={[["姓",selApp.student.lastName],["名",selApp.student.firstName],["姓（カナ）",selApp.student.lastNameKana],["名（カナ）",selApp.student.firstNameKana],["生年月日",selApp.student.birthDate],["学校名",SCHOOLS[selApp.schoolIdx]],["学年",selApp.student.grade+"年"],["入学年度",selApp.student.enrollYear+"年"],["入学月",selApp.student.enrollMonth+"月"]]} warns={curState?.result?.findings}/>
            <KGroup title="申請者情報" fields={[["姓",selApp.applicant.lastName],["名",selApp.applicant.firstName],["姓（カナ）",selApp.applicant.lastNameKana],["名（カナ）",selApp.applicant.firstNameKana],["続柄",selApp.applicant.relationship],["住所",selApp.applicant.address]]} warns={curState?.result?.findings}/>
            <KGroup title="口座情報" fields={[["金融機関名",selApp.bank.bankName],["支店名",selApp.bank.branchName],["口座番号",selApp.bank.accountNumber],["口座名義カナ",selApp.bank.holderKana]]} warns={curState?.result?.findings}/>
            <KGroup title="在籍確認・助成額" fields={[["在籍確認",selApp.enrollment.status],["年間授業料",selApp.tuition.annual.toLocaleString()+"円"],["助成額",selApp.subsidy.amount.toLocaleString()+"円"]]} warns={curState?.result?.findings}/>
          </div>

          {/* 右カラム：審査結果 */}
          <div style={{width:420,minWidth:420,position:"sticky",top:64}}>
            {reviewing&&<div className="k-progress"><div style={{display:"flex",alignItems:"center",gap:8}}><Sp/><span style={{fontSize:12,fontWeight:600,color:"#2980b9"}}>{progress<30?"申請データを確認中...":progress<60?"OpenAI APIで審査中...":progress<90?"分析中...":"結果生成中..."}</span></div><div className="k-progress-bar"><div className="k-progress-fill" style={{width:`${progress}%`}}/></div></div>}

            {error&&!reviewing&&<div style={{background:"#fdf0ef",border:"1px solid #f5b7b1",borderRadius:4,padding:12,marginBottom:12,color:"#c0392b",fontSize:12}}>エラー：{error}</div>}

            {!curState?.result&&!reviewing&&!error&&<div className="k-group" style={{padding:20,textAlign:"center",color:"#999",fontSize:13}}>
              <div style={{fontSize:28,marginBottom:8}}>&#128269;</div>
              <div>「AI審査を実行」ボタンを押すと</div>
              <div>ここに審査結果が表示されます</div>
            </div>}

            {curState?.result&&!reviewing&&<div id="res">
              <div className="k-score" style={{marginBottom:12}}><div className={`k-score-num ${curState.result.overall!=="OK"?"warn":""}`}>{curState.result.score}</div><div style={{fontSize:10,color:"#999"}}>スコア</div><div style={{marginTop:4}}><span className={`k-status ${curState.result.overall==="OK"?"k-status-approved":"k-status-rejected"}`}>{curState.result.overall}</span></div></div>
              <div className="k-group" style={{marginBottom:12}}><div className="k-group-header">AI総合コメント</div><div style={{padding:12,fontSize:13,lineHeight:1.7}}>{curState.result.summary}</div></div>
              <div className="k-group"><div className="k-group-header">検出事項（{(curState.result.findings||[]).length}件）</div><div style={{padding:10}}>{(curState.result.findings||[]).map((f,i)=><div key={i} className={`k-finding k-finding-${f.severity}`}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}><span className="k-flag" style={{background:f.severity==="error"?"#fdf0ef":f.severity==="warning"?"#fef9f0":"#e8f4fd",color:f.severity==="error"?"#c0392b":f.severity==="warning"?"#e67e22":"#2980b9"}}>{f.severity==="error"?"不整合":f.severity==="warning"?"確認推奨":"情報"}</span><span style={{fontSize:11,color:"#666"}}>{f.category}</span>{f.field&&<span style={{fontSize:10,color:"#999",background:"#f5f6f7",padding:"1px 5px",borderRadius:3}}>{f.field}</span>}</div><div style={{fontSize:12,lineHeight:1.7,color:"#555",paddingLeft:8}}>{f.message}</div></div>)}</div></div>
            </div>}
          </div>
        </div>
        <div style={{height:30}}/>
      </div>}
    </div>
  );
}

function KGroup({title,fields,warns}){
  const[open,setOpen]=useState(true);
  const wf=(warns||[]).filter(w=>w.field).map(w=>w.field);
  return<div className="k-group"><div className="k-group-header" onClick={()=>setOpen(!open)}><span style={{fontSize:10,color:"#999"}}>{open?"▼":"▶"}</span>{title}</div>{open&&<div className="k-group-body">{fields.map(([l,v],i)=>{const hit=wf.some(x=>x&&(l.includes(x)||x.includes(l)));return<div key={i} className={`k-field-row ${hit?"k-field-warn":""}`}><div className="k-field-label">{l}</div><div className="k-field-value">{v}</div></div>})}</div>}</div>
}

function Sp(){return<span style={{display:"inline-block",width:14,height:14,border:"2px solid #a9d4f5",borderTopColor:"#3498db",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
