<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI審査システム</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN','Meiryo',sans-serif;color:#333;background:#f5f6f7;font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}

.k-header{height:48px;background:#fff;border-bottom:1px solid #e3e7ee;display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:100}
.k-header-bar{position:absolute;top:0;left:0;right:0;height:4px;background:#3498db}
.k-header-title{font-size:16px;font-weight:700;color:#333;margin-left:8px}
.k-header-sub{font-size:12px;color:#999;margin-left:12px}
.k-back{background:none;border:none;cursor:pointer;font-size:20px;color:#3498db;padding:4px 8px;margin-right:4px}

.k-nav{height:40px;background:#f5f6f7;border-bottom:1px solid #e3e7ee;display:flex;align-items:center;padding:0 16px;gap:8px}
.k-nav-btn{background:#fff;border:1px solid #e3e7ee;border-radius:4px;padding:6px 14px;font-size:12px;cursor:pointer;color:#333;font-weight:500}
.k-nav-btn:hover{background:#e8f4fd;border-color:#3498db}
.k-nav-btn.primary{background:#3498db;color:#fff;border-color:#3498db}
.k-nav-btn.primary:hover{background:#2980b9}
.k-nav-btn:disabled{opacity:0.5;cursor:default}

.k-table{width:100%;border-collapse:collapse;background:#fff;font-size:13px}
.k-table thead th{background:#f5f6f7;border:1px solid #e3e7ee;padding:8px 12px;text-align:left;font-weight:600;color:#666;font-size:11px;white-space:nowrap;position:sticky;top:48px;z-index:10}
.k-table tbody td{border:1px solid #e3e7ee;padding:8px 12px;color:#333}
.k-table tbody tr{cursor:pointer}
.k-table tbody tr:hover{background:#e8f4fd}
.k-table .row-num{width:40px;text-align:center;color:#999;background:#fafbfc}
.k-table .row-highlight{background:#fff8e1}

.k-detail{max-width:1280px;margin:0 auto;padding:16px}
.k-detail-header{background:#fff;border:1px solid #e3e7ee;border-radius:4px;padding:16px 20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.k-group{background:#fff;border:1px solid #e3e7ee;border-radius:4px;margin-bottom:10px;overflow:hidden}
.k-group-header{background:#f5f6f7;border-bottom:1px solid #e3e7ee;padding:10px 16px;font-size:13px;font-weight:700;color:#333;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none}
.k-group-header:hover{background:#eef0f3}
.k-group-body{padding:0}
.k-field-row{display:flex;border-bottom:1px solid #f0f1f4}
.k-field-row:last-child{border-bottom:none}
.k-field-label{width:180px;min-width:180px;background:#fafbfc;padding:10px 14px;font-size:12px;color:#666;font-weight:500;border-right:1px solid #f0f1f4;display:flex;align-items:center}
.k-field-value{flex:1;padding:10px 14px;font-size:13px;color:#333}
.k-field-warn .k-field-label{color:#e67e22;background:#fef9f0}
.k-field-warn .k-field-value{color:#d35400;background:#fef9f0;font-weight:600}

.k-status{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600}
.k-status-pending{background:#f0f1f4;color:#999}
.k-status-reviewing{background:#e8f4fd;color:#2980b9}
.k-status-approved{background:#eafaf1;color:#27ae60}
.k-status-rejected{background:#fdf0ef;color:#e74c3c}

.k-flag{font-size:10px;padding:1px 6px;border-radius:3px;background:#fdf0ef;color:#c0392b;font-weight:600}

.k-result-divider{display:flex;align-items:center;gap:10px;margin:20px 0 14px}
.k-result-divider .line{flex:1;height:1px;background:#e3e7ee}
.k-result-divider .label{padding:6px 16px;background:#e8f4fd;border-radius:20px;font-size:12px;font-weight:700;color:#2980b9}

.k-finding{padding:10px 14px;margin-bottom:6px;background:#fff;border-radius:4px;border-left:3px solid #ccc}
.k-finding-error{border-left-color:#e74c3c}
.k-finding-warning{border-left-color:#f39c12}
.k-finding-info{border-left-color:#3498db}

.k-progress{background:#fff;border:1px solid #bde0fe;border-radius:4px;padding:14px 18px;margin-bottom:12px}
.k-progress-bar{width:100%;height:4px;background:#e3e7ee;border-radius:2px;overflow:hidden;margin-top:8px}
.k-progress-fill{height:100%;background:linear-gradient(90deg,#3498db,#2980b9);border-radius:2px;transition:width 0.3s}

.k-score{text-align:center;padding:16px;background:#fff;border:2px solid #e3e7ee;border-radius:4px;min-width:100px}
.k-score-num{font-size:32px;font-weight:800;color:#27ae60}
.k-score-num.warn{color:#e67e22}

.k-filter{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fff;border-bottom:1px solid #e3e7ee}
.k-select{padding:5px 10px;border-radius:4px;border:1px solid #e3e7ee;font-size:12px;background:#fff}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* Chat Panel */
.chat-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s}
.chat-overlay.open{opacity:1;pointer-events:auto}
.chat-panel{position:fixed;top:0;right:0;bottom:0;width:480px;background:#fff;z-index:201;transform:translateX(100%);transition:transform 0.3s ease;display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,0.15)}
.chat-panel.open{transform:translateX(0)}
.chat-header{height:52px;background:#fff;border-bottom:1px solid #e3e7ee;display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.chat-header-title{font-size:14px;font-weight:700;color:#333;flex:1}
.chat-scope-badge{font-size:11px;background:#e8f4fd;color:#2980b9;padding:2px 8px;border-radius:10px;font-weight:600}
.chat-close{background:none;border:none;font-size:20px;cursor:pointer;color:#999;padding:4px}
.chat-close:hover{color:#333}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-msg{max-width:88%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.chat-msg-ai{align-self:flex-start;background:#f0f2f5;color:#333;border-bottom-left-radius:4px}
.chat-msg-user{align-self:flex-end;background:#3498db;color:#fff;border-bottom-right-radius:4px}
.chat-msg-system{align-self:center;background:#fff8e1;color:#8a6d3b;font-size:11px;padding:6px 12px;border-radius:16px;text-align:center}
.chat-msg-result{align-self:stretch;max-width:100%;background:#f9fafb;border:1px solid #e3e7ee;border-radius:8px;padding:14px}
.chat-input-area{border-top:1px solid #e3e7ee;padding:12px;display:flex;flex-direction:column;gap:8px;flex-shrink:0;background:#fafbfc}
.chat-input-row{display:flex;gap:8px;align-items:flex-end}
.chat-textarea{flex:1;resize:none;border:1px solid #e3e7ee;border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;outline:none;min-height:40px;max-height:120px}
.chat-textarea:focus{border-color:#3498db}
.chat-send{background:#3498db;color:#fff;border:none;border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer;font-weight:600;white-space:nowrap}
.chat-send:hover{background:#2980b9}
.chat-send:disabled{opacity:0.5;cursor:default}
.chat-run-btn{background:#27ae60;color:#fff;border:none;border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer;font-weight:700;width:100%;display:flex;align-items:center;justify-content:center;gap:6px}
.chat-run-btn:hover{background:#219a52}
.chat-run-btn:disabled{opacity:0.5;cursor:default}
.chat-typing{display:flex;gap:4px;padding:4px 0;align-items:center}
.chat-typing span{width:6px;height:6px;background:#aaa;border-radius:50%;animation:bounce 1.2s infinite}
.chat-typing span:nth-child(2){animation-delay:0.2s}
.chat-typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
.chat-criteria{background:#eafaf1;border:1px solid #a3d9b1;border-radius:6px;padding:8px 12px;font-size:12px;color:#1e7e34;margin-top:4px}
.chat-criteria-title{font-weight:700;margin-bottom:4px}

/* Checkbox in table */
.k-check{width:16px;height:16px;accent-color:#3498db;cursor:pointer}

/* Review Checklist */
.rv-checklist{border:1px solid #e3e7ee;border-radius:6px;overflow:hidden}
.rv-item{display:flex;align-items:flex-start;padding:10px 12px;border-bottom:1px solid #f0f2f5;gap:10px;font-size:12px;transition:background 0.15s}
.rv-item:last-child{border-bottom:none}
.rv-item:hover{background:#fafbfc}
.rv-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.rv-icon-ok{background:#eafaf1;color:#27ae60}
.rv-icon-error{background:#fdf0ef;color:#c0392b}
.rv-icon-warn{background:#fef9f0;color:#e67e22}
.rv-icon-skip{background:#f0f2f5;color:#aaa}
.rv-body{flex:1;min-width:0}
.rv-title{font-weight:600;color:#333;margin-bottom:2px}
.rv-desc{color:#888;line-height:1.5;font-size:11px}
.rv-msg{color:#555;line-height:1.6;margin-top:4px;padding:6px 8px;background:#f9fafb;border-radius:4px;font-size:11px}
.rv-msg-error{background:#fdf0ef;color:#c0392b}
.rv-msg-warn{background:#fef9f0;color:#856404}
.rv-section-label{font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.5px;padding:8px 12px 4px;background:#f9fafb}
.rv-summary-bar{display:flex;gap:12px;padding:10px 12px;background:#f9fafb;border-radius:6px;margin-bottom:10px}
.rv-summary-item{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600}
.rv-summary-dot{width:8px;height:8px;border-radius:50%}
</style>
</head>

  mk("R07-0027",2,"村上","奏","ムラカミ","カナデ","2011-01-18",1,2024,4,"村上","宏","ムラカミ","ヒロシ","父","東京都港区南青山5-8-2","三井住友銀行","青山支店","2024252","ムラカミ ヒロシ",480000,"在籍中",120000),
  mk("R07-0028",2,"藤原","葵","フジワラ","アオイ","2010-11-06",2,2023,4,"藤原","真一","フジワラ","シンイチ","父","東京都港区虎ノ門1-5-3","三菱UFJ銀行","虎ノ門支店","3035363","フジワラ シンイチ",480000,"在籍中",120000),
  mk("R07-0029",2,"遠藤","陸","エンドウ","リク","2009-06-20",3,2022,4,"遠藤","美穂","エンドウ","ミホ","母","東京都港区芝浦3-9-1","みずほ銀行","芝浦支店","4046474","エンドウ ミホ",480000,"在籍中",120000),
  mk("R07-0030",2,"近藤","花音","コンドウ","カノン","2011-09-12",1,2024,4,"近藤","洋介","コンドウ","ヨウスケ","父","東京都港区三田4-6-2","りそな銀行","三田支店","5057585","コンドウ ヨウスケ",480000,"在籍中",120000),
];

const stCls={"未審査":"k-status-pending","審査中":"k-status-reviewing","承認":"k-status-approved","差戻し":"k-status-rejected"};

function App(){
  const[page,setPage]=useState("dash");
  const[schoolFilter,setSchoolFilter]=useState("");
  const[schoolIdx,setSchoolIdx]=useState(null);
  const[selApp,setSelApp]=useState(null);
  const[appStates,setAppStates]=useState(()=>Object.fromEntries(allApps.map(a=>[a.id,{status:"未審査",flag:"",result:null}])));
  const[reviewing,setReviewing]=useState(false);
  const[progress,setProgress]=useState(0);
  const[error,setError]=useState(null);
  const[schResult,setSchResult]=useState(null);
  const[schReviewing,setSchReviewing]=useState(false);
  const[schProgress,setSchProgress]=useState(0);
  // チャット関連
  const[chatOpen,setChatOpen]=useState(false);
  const[chatScope,setChatScope]=useState(null); // {type:"all"|"school"|"custom", schoolIdx?, appIds?[]}
  const[chatMessages,setChatMessages]=useState([]);
  const[chatLoading,setChatLoading]=useState(false);
  const[chatInput,setChatInput]=useState("");
  const[chatReviewResult,setChatReviewResult]=useState(null);
  const[selectedIds,setSelectedIds]=useState(new Set());
  const chatEndRef=useRef(null);
  const filtered=useMemo(()=>schoolFilter?allApps.filter(a=>SCHOOLS[a.schoolIdx]===schoolFilter):allApps,[schoolFilter]);
  const schoolApps=useMemo(()=>schoolIdx!==null?allApps.filter(a=>a.schoolIdx===schoolIdx):[],[schoolIdx]);
  const curState=selApp?appStates[selApp.id]:null;

  const goSchool=(idx)=>{setSchoolIdx(idx);setSchResult(null);setPage("school")};
  const goDetail=(app)=>{setSelApp(app);setPage("detail")};
  const goBack=()=>{if(page==="detail"){schoolIdx!==null?setPage("school"):setPage("dash")}else{setPage("dash");setSchoolIdx(null)}};

  // チャット対象の申請を取得
  const getChatApps=useCallback((scope)=>{
    if(!scope)return[];
    if(scope.type==="all")return allApps;
    if(scope.type==="school")return allApps.filter(a=>a.schoolIdx===scope.schoolIdx);
    if(scope.type==="custom")return allApps.filter(a=>scope.appIds.includes(a.id));
    return[];
  },[]);

  const formatAppsForAPI=useCallback((apps)=>apps.map(a=>({
    受付番号:a.id,学校名:SCHOOLS[a.schoolIdx],
    生徒姓:a.student.lastName,生徒名:a.student.firstName,
    生年月日:a.student.birthDate,学年:a.student.grade,
    申請者姓:a.applicant.lastName,申請者名:a.applicant.firstName,
    続柄:a.applicant.relationship,在籍確認:a.enrollment.status,
    年間授業料:a.tuition.annual,助成額:a.subsidy.amount
  })),[]);

  // チャットを開く（スコープは会話の中で決定）
  const openChat=useCallback(()=>{
    const schoolSummary=SCHOOLS.map((s,i)=>{const c=allApps.filter(a=>a.schoolIdx===i).length;return`  ・${s}（${c}件）`}).join('\n');
    setChatScope({type:"all"}); // 初期は全件を渡す
    setChatMessages([{role:"assistant",content:`複数審査を開始します。まず、どのような審査を行いたいですか？\n\n現在のデータ：全${allApps.length}件\n${schoolSummary}\n\n以下のような審査が可能です：\n・全件を横断してチェック（重複、不自然なパターンなど）\n・学校単位で審査（特定の学校に絞って詳しく確認）\n・特定の条件で対象を絞り込んで審査\n\nどのような範囲・観点で審査しますか？`}]);
    setChatReviewResult(null);
    setChatOpen(true);
  },[]);

  const closeChat=useCallback(()=>{setChatOpen(false);setChatInput("");},[]);

  // チャット送信
  const sendChat=useCallback(async()=>{
    if(!chatInput.trim()||chatLoading)return;
    const userMsg={role:"user",content:chatInput.trim()};
    const newMessages=[...chatMessages,userMsg];
    setChatMessages(newMessages);setChatInput("");setChatLoading(true);
    try{
      const apps=formatAppsForAPI(getChatApps(chatScope));
      const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:newMessages,applications:apps})});
      if(!res.ok){const e=await res.json();throw new Error(e.error||'API error')}
      const{reply}=await res.json();
      setChatMessages(prev=>[...prev,{role:"assistant",content:reply}]);
    }catch(err){
      setChatMessages(prev=>[...prev,{role:"assistant",content:`エラーが発生しました: ${err.message}`}]);
    }
    setChatLoading(false);
  },[chatInput,chatMessages,chatScope,chatLoading,getChatApps,formatAppsForAPI]);

  // 会話を踏まえた審査実行
  const runChatReview=useCallback(async()=>{
    if(chatLoading)return;
    setChatLoading(true);
    setChatMessages(prev=>[...prev,{role:"system",content:"審査を実行しています..."}]);
    try{
      const apps=formatAppsForAPI(getChatApps(chatScope));
      const conversation=chatMessages.filter(m=>m.role!=="system");
      const res=await fetch('/api/review-with-context',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({conversation,applications:apps})});
      if(!res.ok){const e=await res.json();throw new Error(e.error||'API error')}
      const result=await res.json();
      setChatReviewResult(result);
      setChatMessages(prev=>[...prev.filter(m=>m.content!=="審査を実行しています..."),{role:"result",content:JSON.stringify(result),data:result}]);
      // フラグ反映
      const flaggedIds={};
      (result.issues||[]).forEach(issue=>(issue.ids||[]).forEach(id=>{flaggedIds[id]=(flaggedIds[id]||[]).concat(issue.title)}));
      setAppStates(p=>{const n={...p};Object.entries(flaggedIds).forEach(([id,titles])=>{n[id]={...n[id],flag:titles.join("、")}});return n});
      if(chatScope?.type==="school")setSchResult(result.issues||[]);
    }catch(err){
      setChatMessages(prev=>[...prev.filter(m=>m.content!=="審査を実行しています..."),{role:"assistant",content:`審査エラー: ${err.message}`}]);
    }
    setChatLoading(false);
  },[chatMessages,chatScope,chatLoading,getChatApps,formatAppsForAPI]);

  // チャットスクロール
  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:"smooth"})},[chatMessages,chatLoading]);

  // チェックボックス操作
  const toggleSelect=useCallback((id,e)=>{e.stopPropagation();setSelectedIds(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n});},[]);
  const toggleSelectAll=useCallback((apps)=>{setSelectedIds(prev=>{const allSelected=apps.every(a=>prev.has(a.id));const n=new Set(prev);apps.forEach(a=>allSelected?n.delete(a.id):n.add(a.id));return n});},[]);

  // 単体AI審査
  const runSingle=useCallback(async()=>{
    if(!selApp)return;setReviewing(true);setProgress(10);setError(null);
    setAppStates(p=>({...p,[selApp.id]:{...p[selApp.id],status:"審査中"}}));
    const intv=setInterval(()=>setProgress(p=>Math.min(p+8,85)),500);
    try{
      const applicationData={
        受付番号:selApp.id,
        学校名:SCHOOLS[selApp.schoolIdx],
        生徒姓:selApp.student.lastName,生徒名:selApp.student.firstName,生徒姓カナ:selApp.student.lastNameKana,生徒名カナ:selApp.student.firstNameKana,
        生年月日:selApp.student.birthDate,学年:selApp.student.grade,入学年:selApp.student.enrollYear,入学月:selApp.student.enrollMonth,
        申請者姓:selApp.applicant.lastName,申請者名:selApp.applicant.firstName,申請者姓カナ:selApp.applicant.lastNameKana,申請者名カナ:selApp.applicant.firstNameKana,
        続柄:selApp.applicant.relationship,住所:selApp.applicant.address,
        銀行名:selApp.bank.bankName,支店名:selApp.bank.branchName,口座番号:selApp.bank.accountNumber,口座名義カナ:selApp.bank.holderKana,
        在籍確認:selApp.enrollment.status,年間授業料:selApp.tuition.annual,助成額:selApp.subsidy.amount
      };
      const res=await fetch('/api/review',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({applicationData})});
      clearInterval(intv);setProgress(100);
      if(!res.ok){const e=await res.json();throw new Error(e.error||'API error')}
      const result=await res.json();
      const CKLABELS={"grade_consistency":"学年整合性","name_match":"姓の一致","relationship":"続柄確認","account_holder":"口座名義","enrollment":"在籍確認","tuition_range":"授業料妥当性","subsidy_cap":"助成額上限","subsidy_vs_tuition":"助成額対授業料","ocr_verification":"原本照合"};
      const flagText=(result.checks||[]).filter(c=>c.result==="error").map(c=>CKLABELS[c.id]||c.id).join("、")||(result.checks||[]).filter(c=>c.result==="warning").map(c=>CKLABELS[c.id]||c.id).join("、")||"";
      setAppStates(p=>({...p,[selApp.id]:{status:result.overall==="OK"?"承認":"差戻し",flag:flagText,result}}));
    }catch(err){clearInterval(intv);setError(err.message);setAppStates(p=>({...p,[selApp.id]:{...p[selApp.id],status:"未審査"}}));}
    setReviewing(false);setProgress(0);
    setTimeout(()=>document.getElementById("res")?.scrollIntoView({behavior:"smooth"}),200);
  },[selApp]);

  // 横断AI審査（学校単位）
  const runSchool=useCallback(async()=>{
    setSchReviewing(true);setSchProgress(10);setError(null);
    const intv=setInterval(()=>setSchProgress(p=>Math.min(p+6,85)),500);
    try{
      const apps=schoolApps.map(a=>({受付番号:a.id,生徒姓:a.student.lastName,生徒名:a.student.firstName,生年月日:a.student.birthDate,申請者姓:a.applicant.lastName,申請者名:a.applicant.firstName,続柄:a.applicant.relationship,在籍確認:a.enrollment.status,年間授業料:a.tuition.annual,助成額:a.subsidy.amount}));
      const res=await fetch('/api/review-school',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({schoolName:SCHOOLS[schoolIdx],applications:apps})});
      clearInterval(intv);setSchProgress(100);
      if(!res.ok){const e=await res.json();throw new Error(e.error||'API error')}
      const result=await res.json();
      const flaggedIds={};
      (result.issues||[]).forEach(issue=>(issue.ids||[]).forEach(id=>{flaggedIds[id]=(flaggedIds[id]||[]).concat(issue.title)}));
      setAppStates(p=>{const n={...p};Object.entries(flaggedIds).forEach(([id,titles])=>{n[id]={...n[id],flag:titles.join("、")}});return n});
      setSchResult(result.issues||[]);
    }catch(err){clearInterval(intv);setError(err.message)}
    setSchReviewing(false);setSchProgress(0);
  },[schoolApps,schoolIdx]);

  return(
    <div style={{minHeight:"100vh",background:"#f5f6f7"}}>
      <div className="k-header">
        <div className="k-header-bar"/>
        {page!=="dash"&&<button className="k-back" onClick={goBack}>&#8249;</button>}
        <span className="k-header-title">AI審査システム</span>
        <span className="k-header-sub">
          {page==="dash"&&"レコード一覧"}
          {page==="school"&&SCHOOLS[schoolIdx]}
          {page==="detail"&&`${selApp?.student.lastName}${selApp?.student.firstName}（${selApp?.id}）`}
        </span>
      </div>

      {/* DASHBOARD */}
      {page==="dash"&&<>
        <div className="k-filter">
          <span style={{fontSize:12,color:"#666"}}>絞り込み：</span>
          <select className="k-select" value={schoolFilter} onChange={e=>setSchoolFilter(e.target.value)}>
            <option value="">すべて（{allApps.length}件）</option>
            {SCHOOLS.map(s=><option key={s} value={s}>{s}（{allApps.filter(a=>SCHOOLS[a.schoolIdx]===s).length}件）</option>)}
          </select>
          {schoolFilter&&<button className="k-nav-btn" onClick={()=>goSchool(SCHOOLS.indexOf(schoolFilter))}>学校詳細 →</button>}
          <span style={{flex:1}}/>
          <button className="k-nav-btn primary" onClick={openChat}>複数審査</button>
          <span style={{fontSize:12,color:"#999"}}>{filtered.length}件</span>
        </div>
        <div>
          <table className="k-table">
            <thead><tr><th className="row-num">#</th><th>ステータス</th><th>受付番号</th><th>学校名</th><th>生徒名</th><th>申請者名</th><th>在籍確認</th><th>年間授業料</th><th>助成額</th><th>審査フラグ</th></tr></thead>
            <tbody>{filtered.map((a,i)=>{const st=appStates[a.id];return(
              <tr key={a.id} onClick={()=>goDetail(a)}>
                <td className="row-num">{i+1}</td>
                <td><span className={`k-status ${stCls[st.status]}`}>{st.status}</span></td>
                <td style={{fontWeight:600,color:"#3498db"}}>{a.id}</td>
                <td>{SCHOOLS[a.schoolIdx]}</td>
                <td style={{fontWeight:500}}>{a.student.lastName} {a.student.firstName}</td>
                <td>{a.applicant.lastName} {a.applicant.firstName}</td>
                <td style={{color:a.enrollment.status!=="在籍中"?"#c0392b":"#333",fontWeight:a.enrollment.status!=="在籍中"?700:400}}>{a.enrollment.status}</td>
                <td style={{textAlign:"right"}}>{a.tuition.annual.toLocaleString()}円</td>
                <td style={{textAlign:"right"}}>{a.subsidy.amount.toLocaleString()}円</td>
                <td>{st.flag?<span className="k-flag">{st.flag}</span>:<span style={{color:"#ccc"}}>—</span>}</td>
              </tr>)})}</tbody>
          </table>
        </div>
      </>}

      {/* SCHOOL */}
      {page==="school"&&<>
        <div className="k-nav">
          <span style={{fontWeight:700}}>{SCHOOLS[schoolIdx]}</span>
          <span style={{fontSize:12,color:"#999"}}>（{schoolApps.length}件）</span>
          <span style={{flex:1}}/>
          <button className="k-nav-btn primary" onClick={openChat}>複数審査</button>
        </div>
        <div>
          <table className="k-table">
            <thead><tr><th className="row-num">#</th><th>ステータス</th><th>受付番号</th><th>生徒名</th><th>学年</th><th>申請者</th><th>続柄</th><th>在籍確認</th><th>年間授業料</th><th>助成額</th><th>審査フラグ</th></tr></thead>
            <tbody>{schoolApps.map((a,i)=>{const st=appStates[a.id];const isO=schResult?.some(r=>r.type==="tuition_outlier"&&r.ids?.includes(a.id));const isD=schResult?.some(r=>r.type==="duplicate"&&r.ids?.includes(a.id));const isE=schResult?.some(r=>r.type==="enrollment_issue"&&r.ids?.includes(a.id));const isSC=schResult?.some(r=>r.type==="subsidy_over_cap"&&r.ids?.includes(a.id));const isST=schResult?.some(r=>r.type==="subsidy_over_tuition"&&r.ids?.includes(a.id));return(
              <tr key={a.id} onClick={()=>goDetail(a)} className={(isO||isD||isE||isSC||isST)?"row-highlight":""}>
                <td className="row-num">{i+1}</td>
                <td><span className={`k-status ${stCls[st.status]}`}>{st.status}</span></td>
                <td style={{fontWeight:600,color:"#3498db"}}>{a.id}</td>
                <td style={{fontWeight:500}}>{a.student.lastName} {a.student.firstName}{isD&&<span className="k-flag" style={{marginLeft:4}}>重複</span>}</td>
                <td>{a.student.grade}年</td>
                <td>{a.applicant.lastName} {a.applicant.firstName}</td>
                <td>{a.applicant.relationship}</td>
                <td style={{color:a.enrollment.status!=="在籍中"?"#c0392b":"#333",fontWeight:a.enrollment.status!=="在籍中"?700:400}}>{a.enrollment.status}{isE&&<span className="k-flag" style={{marginLeft:4}}>要確認</span>}</td>
                <td style={{fontWeight:isO?700:400,color:isO?"#c0392b":"#333",textAlign:"right"}}>{a.tuition.annual.toLocaleString()}円{isO&&<span className="k-flag" style={{marginLeft:4}}>外れ値</span>}</td>
                <td style={{fontWeight:(isSC||isST)?700:400,color:(isSC||isST)?"#c0392b":"#333",textAlign:"right"}}>{a.subsidy.amount.toLocaleString()}円{isSC&&<span className="k-flag" style={{marginLeft:4}}>上限超過</span>}{isST&&<span className="k-flag" style={{marginLeft:4}}>授業料超過</span>}</td>
                <td>{st.flag?<span className="k-flag">{st.flag}</span>:"—"}</td>
              </tr>)})}</tbody>
          </table>
        </div>
        {schReviewing&&<div className="k-progress" style={{margin:16}}><div style={{display:"flex",alignItems:"center",gap:8}}><Sp/><span style={{fontSize:12,fontWeight:600,color:"#2980b9"}}>OpenAI APIで複数審査中...</span></div><div className="k-progress-bar"><div className="k-progress-fill" style={{width:`${schProgress}%`}}/></div></div>}
        {error&&!schReviewing&&<div style={{margin:16,background:"#fdf0ef",border:"1px solid #f5b7b1",borderRadius:4,padding:12,color:"#c0392b",fontSize:12}}>エラー：{error}</div>}
        {schResult&&!schReviewing&&<div style={{padding:16}}>
          <div className="k-result-divider"><div className="line"/><div className="label">複数審査結果</div><div className="line"/></div>
          {schResult.length===0?<div className="k-group" style={{padding:16,color:"#27ae60",fontWeight:600}}>問題は検出されませんでした。</div>:schResult.map((is,i)=><div key={i} className="k-finding k-finding-error" style={{margin:"0 0 8px"}}><div style={{fontWeight:700,marginBottom:4}}><span className="k-flag" style={{marginRight:6}}>要確認</span>{is.title}</div><div style={{fontSize:12,lineHeight:1.7,color:"#555"}}>{is.message}</div><div style={{marginTop:4,fontSize:11,color:"#999"}}>該当：{(is.ids||[]).map(id=><span key={id} className="k-flag" style={{marginRight:3}}>{id}</span>)}</div></div>)}
        </div>}
      </>}

      {/* DETAIL */}
      {page==="detail"&&selApp&&<div className="k-detail">
        <div className="k-detail-header">
          <div>
            <div style={{fontSize:18,fontWeight:700}}>{selApp.student.lastName} {selApp.student.firstName}<span style={{fontSize:12,color:"#999",marginLeft:8,fontWeight:400}}>{selApp.id}</span></div>
            <div style={{fontSize:12,color:"#999",marginTop:2}}>{SCHOOLS[selApp.schoolIdx]}　{selApp.student.grade}年</div>
          </div>
          <button className="k-nav-btn primary" onClick={runSingle} disabled={reviewing}>{reviewing?"審査中...":"AI審査を実行"}</button>
        </div>

        <div style={{display:"flex",gap:16,alignItems:"flex-start"}}>
          {/* 左カラム：申請データ */}
          <div style={{flex:1,minWidth:0}}>
            <KGroup title="生徒情報" fields={[["姓",selApp.student.lastName],["名",selApp.student.firstName],["姓（カナ）",selApp.student.lastNameKana],["名（カナ）",selApp.student.firstNameKana],["生年月日",selApp.student.birthDate],["学校名",SCHOOLS[selApp.schoolIdx]],["学年",selApp.student.grade+"年"],["入学年度",selApp.student.enrollYear+"年"],["入学月",selApp.student.enrollMonth+"月"]]} warns={curState?.result?.findings}/>
            <KGroup title="申請者情報" fields={[["姓",selApp.applicant.lastName],["名",selApp.applicant.firstName],["姓（カナ）",selApp.applicant.lastNameKana],["名（カナ）",selApp.applicant.firstNameKana],["続柄",selApp.applicant.relationship],["住所",selApp.applicant.address]]} warns={curState?.result?.findings}/>
            <KGroup title="口座情報" fields={[["金融機関名",selApp.bank.bankName],["支店名",selApp.bank.branchName],["口座番号",selApp.bank.accountNumber],["口座名義カナ",selApp.bank.holderKana]]} warns={curState?.result?.findings}/>
            <KGroup title="在籍確認・助成額" fields={[["在籍確認",selApp.enrollment.status],["年間授業料",selApp.tuition.annual.toLocaleString()+"円"],["助成額",selApp.subsidy.amount.toLocaleString()+"円"]]} warns={curState?.result?.findings}/>
          </div>

          {/* 右カラム：審査結果 */}
          <div style={{width:420,minWidth:420,position:"sticky",top:64}}>
            {reviewing&&<div className="k-progress"><div style={{display:"flex",alignItems:"center",gap:8}}><Sp/><span style={{fontSize:12,fontWeight:600,color:"#2980b9"}}>{progress<30?"申請データを確認中...":progress<60?"OpenAI APIで審査中...":progress<90?"分析中...":"結果生成中..."}</span></div><div className="k-progress-bar"><div className="k-progress-fill" style={{width:`${progress}%`}}/></div></div>}

            {error&&!reviewing&&<div style={{background:"#fdf0ef",border:"1px solid #f5b7b1",borderRadius:4,padding:12,marginBottom:12,color:"#c0392b",fontSize:12}}>エラー：{error}</div>}

            {!curState?.result&&!reviewing&&!error&&<div className="k-group" style={{padding:20,textAlign:"center",color:"#999",fontSize:13}}>
              <div style={{fontSize:28,marginBottom:8}}>&#128269;</div>
              <div>「AI審査を実行」ボタンを押すと</div>
              <div>ここに審査結果が表示されます</div>
            </div>}

            {curState?.result&&!reviewing&&(()=>{
              const r=curState.result;
              const checks=r.checks||[];
              const LABELS={"grade_consistency":"学年整合性","name_match":"姓の一致","relationship":"続柄確認","account_holder":"口座名義確認","enrollment":"在籍確認","tuition_range":"授業料妥当性","subsidy_cap":"助成額上限チェック","subsidy_vs_tuition":"助成額対授業料チェック","ocr_verification":"提出書類の原本照合"};
              const DESCS={"grade_consistency":"入学時年齢と学年の整合性","name_match":"生徒と申請者の姓が一致","relationship":"続柄が父または母","account_holder":"口座名義と申請者名の一致","enrollment":"在籍中であること","tuition_range":"年間授業料が10万〜200万円の範囲内","subsidy_cap":"助成額が制度上限10万円以内","subsidy_vs_tuition":"助成額が授業料以下","ocr_verification":"本番ではOCR読取結果と申請データを自動照合"};
              const okCount=checks.filter(c=>c.result==="ok").length;
              const errCount=checks.filter(c=>c.result==="error").length;
              const warnCount=checks.filter(c=>c.result==="warning").length;
              const skipCount=checks.filter(c=>c.result==="skip").length;
              return<div id="res">
                <div className="k-score" style={{marginBottom:12}}><div className={`k-score-num ${r.overall!=="OK"?"warn":""}`}>{r.score}</div><div style={{fontSize:10,color:"#999"}}>スコア</div><div style={{marginTop:4}}><span className={`k-status ${r.overall==="OK"?"k-status-approved":"k-status-rejected"}`}>{r.overall}</span></div></div>
                <div className="rv-summary-bar">
                  <div className="rv-summary-item"><div className="rv-summary-dot" style={{background:"#27ae60"}}/>{okCount}件 OK</div>
                  {errCount>0&&<div className="rv-summary-item"><div className="rv-summary-dot" style={{background:"#c0392b"}}/>{errCount}件 不整合</div>}
                  {warnCount>0&&<div className="rv-summary-item"><div className="rv-summary-dot" style={{background:"#e67e22"}}/>{warnCount}件 要確認</div>}
                  {skipCount>0&&<div className="rv-summary-item"><div className="rv-summary-dot" style={{background:"#aaa"}}/>{skipCount}件 未実装</div>}
                </div>
                <div className="k-group" style={{marginBottom:12}}><div className="k-group-header">AI総合コメント</div><div style={{padding:12,fontSize:13,lineHeight:1.7}}>{r.summary}</div></div>
                <div className="k-group" style={{marginBottom:12}}><div className="k-group-header">審査チェック項目（{checks.length}項目）</div>
                  <div className="rv-checklist">
                    {checks.map((c,i)=><div key={i} className="rv-item" style={c.result==="skip"?{background:"#f9fafb",opacity:0.85}:{}}>
                      <div className={`rv-icon rv-icon-${c.result}`}>{c.result==="ok"?"✓":c.result==="error"?"✗":c.result==="warning"?"!":"—"}</div>
                      <div className="rv-body">
                        <div className="rv-title">{LABELS[c.id]||c.id}{c.result==="skip"&&<span style={{marginLeft:6,fontSize:10,color:"#fff",background:"#aaa",padding:"1px 6px",borderRadius:8,fontWeight:600}}>本番実装予定</span>}</div>
                        <div className="rv-desc">{DESCS[c.id]||""}</div>
                        {c.message&&<div className={`rv-msg ${c.result==="error"?"rv-msg-error":c.result==="warning"?"rv-msg-warn":""}`}>{c.message}</div>}
                      </div>
                    </div>)}
                  </div>
                </div>
              </div>;
            })()}
          </div>
        </div>
        <div style={{height:30}}/>
      </div>}
      {/* CHAT PANEL */}
      <div className={`chat-overlay ${chatOpen?"open":""}`} onClick={closeChat}/>
      <div className={`chat-panel ${chatOpen?"open":""}`}>
        <div className="chat-header">
          <span className="chat-header-title">AI審査チャット</span>
          <span className="chat-scope-badge">全{allApps.length}件</span>
          <button className="chat-close" onClick={closeChat}>&times;</button>
        </div>
        <div className="chat-messages">
          {chatMessages.map((m,i)=>{
            if(m.role==="result"&&m.data){
              const r=m.data;
              return<div key={i} className="chat-msg chat-msg-result">
                {r.appliedCriteria&&<div className="chat-criteria"><div className="chat-criteria-title">適用した評価観点:</div>{r.appliedCriteria.map((c,j)=><div key={j}>・{c}</div>)}</div>}
                <div style={{marginTop:10,fontWeight:700,fontSize:13}}>検出結果（{(r.issues||[]).length}件）</div>
                {(r.issues||[]).length===0?<div style={{color:"#27ae60",fontWeight:600,marginTop:6}}>問題は検出されませんでした。</div>:(r.issues||[]).map((is,j)=><div key={j} className="k-finding k-finding-error" style={{margin:"8px 0 0"}}><div style={{fontWeight:700,marginBottom:3}}><span className="k-flag" style={{marginRight:6}}>要確認</span>{is.title}</div><div style={{fontSize:12,lineHeight:1.7,color:"#555"}}>{is.message}</div><div style={{marginTop:3,fontSize:11,color:"#999"}}>該当：{(is.ids||[]).map(id=><span key={id} className="k-flag" style={{marginRight:3}}>{id}</span>)}</div></div>)}
              </div>;
            }
            if(m.role==="system")return<div key={i} className="chat-msg chat-msg-system">{m.content}</div>;
            return<div key={i} className={`chat-msg ${m.role==="user"?"chat-msg-user":"chat-msg-ai"}`}>{m.content}</div>;
          })}
          {chatLoading&&<div className="chat-msg chat-msg-ai"><div className="chat-typing"><span/><span/><span/></div></div>}
          <div ref={chatEndRef}/>
        </div>
        <div className="chat-input-area">
          <div className="chat-input-row">
            <textarea className="chat-textarea" rows={1} placeholder="審査の観点や質問を入力..." value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat()}}} disabled={chatLoading}/>
            <button className="chat-send" onClick={sendChat} disabled={chatLoading||!chatInput.trim()}>送信</button>
          </div>
          {chatMessages.filter(m=>m.role==="user").length>0&&!chatReviewResult&&<button className="chat-run-btn" onClick={runChatReview} disabled={chatLoading}>{chatLoading?"審査実行中...":"この観点で審査を実行"}</button>}
        </div>
      </div>
    </div>
  );
}

function KGroup({title,fields,warns}){
  const[open,setOpen]=useState(true);
  const wf=(warns||[]).filter(w=>w.field).map(w=>w.field);
  return<div className="k-group"><div className="k-group-header" onClick={()=>setOpen(!open)}><span style={{fontSize:10,color:"#999"}}>{open?"▼":"▶"}</span>{title}</div>{open&&<div className="k-group-body">{fields.map(([l,v],i)=>{const hit=wf.some(x=>x&&(l.includes(x)||x.includes(l)));return<div key={i} className={`k-field-row ${hit?"k-field-warn":""}`}><div className="k-field-label">{l}</div><div className="k-field-value">{v}</div></div>})}</div>}</div>
}

function Sp(){return<span style={{display:"inline-block",width:14,height:14,border:"2px solid #a9d4f5",borderTopColor:"#3498db",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
