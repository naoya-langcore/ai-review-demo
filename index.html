<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI審査システム</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN','Meiryo',sans-serif;color:#333;background:#f5f6f7;font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* kintone header bar */
.k-header{height:48px;background:#fff;border-bottom:1px solid #e3e7ee;display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:100}
.k-header-bar{position:absolute;top:0;left:0;right:0;height:4px;background:#3498db}
.k-header-title{font-size:16px;font-weight:700;color:#333;margin-left:8px}
.k-header-sub{font-size:12px;color:#999;margin-left:12px}
.k-back{background:none;border:none;cursor:pointer;font-size:20px;color:#3498db;padding:4px 8px;margin-right:4px}

/* kintone nav bar (under header) */
.k-nav{height:40px;background:#f5f6f7;border-bottom:1px solid #e3e7ee;display:flex;align-items:center;padding:0 16px;gap:8px}
.k-nav-btn{background:#fff;border:1px solid #e3e7ee;border-radius:4px;padding:6px 14px;font-size:12px;cursor:pointer;color:#333;font-weight:500}
.k-nav-btn:hover{background:#e8f4fd;border-color:#3498db}
.k-nav-btn.primary{background:#3498db;color:#fff;border-color:#3498db}
.k-nav-btn.primary:hover{background:#2980b9}
.k-nav-btn:disabled{opacity:0.5;cursor:default}

/* kintone table */
.k-table{width:100%;border-collapse:collapse;background:#fff;font-size:13px}
.k-table thead th{background:#f5f6f7;border:1px solid #e3e7ee;padding:8px 12px;text-align:left;font-weight:600;color:#666;font-size:11px;white-space:nowrap;position:sticky;top:88px;z-index:10}
.k-table tbody td{border:1px solid #e3e7ee;padding:8px 12px;color:#333}
.k-table tbody tr{cursor:pointer}
.k-table tbody tr:hover{background:#e8f4fd}
.k-table .row-num{width:40px;text-align:center;color:#999;background:#fafbfc}
.k-table .row-highlight{background:#fff8e1}

/* kintone record detail */
.k-detail{max-width:960px;margin:0 auto;padding:16px}
.k-detail-header{background:#fff;border:1px solid #e3e7ee;border-radius:4px;padding:16px 20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.k-group{background:#fff;border:1px solid #e3e7ee;border-radius:4px;margin-bottom:10px;overflow:hidden}
.k-group-header{background:#f5f6f7;border-bottom:1px solid #e3e7ee;padding:10px 16px;font-size:13px;font-weight:700;color:#333;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none}
.k-group-header:hover{background:#eef0f3}
.k-group-body{padding:0}
.k-field-row{display:flex;border-bottom:1px solid #f0f1f4}
.k-field-row:last-child{border-bottom:none}
.k-field-label{width:180px;min-width:180px;background:#fafbfc;padding:10px 14px;font-size:12px;color:#666;font-weight:500;border-right:1px solid #f0f1f4;display:flex;align-items:center}
.k-field-value{flex:1;padding:10px 14px;font-size:13px;color:#333}
.k-field-warn .k-field-label{color:#e67e22;background:#fef9f0}
.k-field-warn .k-field-value{color:#d35400;background:#fef9f0;font-weight:600}

/* status badges */
.k-status{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600}
.k-status-pending{background:#f0f1f4;color:#999}
.k-status-reviewing{background:#e8f4fd;color:#2980b9}
.k-status-approved{background:#eafaf1;color:#27ae60}
.k-status-rejected{background:#fdf0ef;color:#e74c3c}

/* flag */
.k-flag{font-size:10px;padding:1px 6px;border-radius:3px;background:#fdf0ef;color:#c0392b;font-weight:600}

/* result area */
.k-result-divider{display:flex;align-items:center;gap:10px;margin:20px 0 14px}
.k-result-divider .line{flex:1;height:1px;background:#e3e7ee}
.k-result-divider .label{padding:6px 16px;background:#e8f4fd;border-radius:20px;font-size:12px;font-weight:700;color:#2980b9}

.k-finding{padding:10px 14px;margin-bottom:6px;background:#fff;border-radius:4px;border-left:3px solid #ccc}
.k-finding-error{border-left-color:#e74c3c}
.k-finding-warning{border-left-color:#f39c12}
.k-finding-info{border-left-color:#3498db}

/* progress */
.k-progress{background:#fff;border:1px solid #bde0fe;border-radius:4px;padding:14px 18px;margin-bottom:12px}
.k-progress-bar{width:100%;height:4px;background:#e3e7ee;border-radius:2px;overflow:hidden;margin-top:8px}
.k-progress-fill{height:100%;background:linear-gradient(90deg,#3498db,#2980b9);border-radius:2px;transition:width 0.3s}

/* docs */
.k-doc{flex:1;border:1px solid #e3e7ee;border-radius:4px;overflow:hidden;text-align:center}
.k-doc-preview{height:90px;background:#f5f6f7;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.k-doc-label{padding:6px;border-top:1px solid #e3e7ee;font-size:10px;color:#999}

/* score */
.k-score{text-align:center;padding:16px;background:#fff;border:2px solid #e3e7ee;border-radius:4px;min-width:100px}
.k-score-num{font-size:32px;font-weight:800;color:#27ae60}
.k-score-num.warn{color:#e67e22}

/* OCR match */
.k-match{flex:1;padding:8px;border-radius:4px;text-align:center;border:1px solid #e3e7ee}
.k-match-ok{background:#eafaf1;border-color:#a3d9a5}
.k-match-ng{background:#fef9f0;border-color:#f5cba7}

/* filter area */
.k-filter{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fff;border-bottom:1px solid #e3e7ee}
.k-select{padding:5px 10px;border-radius:4px;border:1px solid #e3e7ee;font-size:12px;background:#fff}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
</style>
</head>

function genSchoolResult(apps){
  const issues=[],nm={};
  apps.forEach(a=>{const k=a.student.lastName+a.student.firstName;(nm[k]=nm[k]||[]).push(a)});
  Object.entries(nm).forEach(([n,l])=>{if(l.length>1)issues.push({type:"dup",title:`重複申請：「${n}」`,msg:`受付番号 ${l.map(a=>a.id).join(", ")} で同一生徒名。`,ids:l.map(a=>a.id)})});
  const freq={};apps.forEach(a=>freq[a.tuition.annual]=(freq[a.tuition.annual]||0)+1);
  const mode=+Object.entries(freq).sort((a,b)=>b[1]-a[1])[0][0];
  const out=apps.filter(a=>a.tuition.annual!==mode);
  if(out.length>0&&out.length<apps.length/2)issues.push({type:"tuit",title:"授業料の外れ値",msg:`多数派${mode.toLocaleString()}円に対し${out.map(a=>`${a.student.lastName}${a.student.firstName}(${a.id})=${a.tuition.annual.toLocaleString()}円`).join("、")}。`,ids:out.map(a=>a.id)});
  return issues;
}

function App(){

    const intv=setInterval(()=>setProgress(p=>Math.min(p+8,85)),500);

      const applicationData={student:{...selApp.student,schoolName:SCHOOLS[selApp.schoolIdx]},applicant:selApp.applicant,address:selApp.address,bank:selApp.bank,tuition:selApp.tuition,enrollment:selApp.enrollment};

      const res=await fetch('/api/review',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({applicationData,ocrData,checkItems:CHECK_ITEMS})});
      clearInterval(intv);setProgress(100);
      if(!res.ok){const e=await res.json();throw new Error(e.error||'API error')}
      const result=await res.json();
      const flagText=(result.findings||[]).filter(f=>f.severity==="error").map(f=>f.category).join("、")||(result.findings||[]).filter(f=>f.severity==="warning").map(f=>f.category).join("、")||"";
      setAppStates(p=>({...p,[selApp.id]:{status:result.overall==="OK"?"承認":"差戻し",flag:flagText,result:{...result,ocr:selApp.ocr}}}));
    }catch(err){clearInterval(intv);setError(err.message);setAppStates(p=>({...p,[selApp.id]:{...p[selApp.id],status:"未審査"}}));}
    setReviewing(false);setProgress(0);
    setTimeout(()=>document.getElementById("res")?.scrollIntoView({behavior:"smooth"}),200);
  },[selApp]);

  const runSchool=useCallback(async()=>{
    setSchReviewing(true);await new Promise(r=>setTimeout(r,1500));

    setAppStates(p=>{const n={...p};Object.entries(flaggedIds).forEach(([id,titles])=>{n[id]={...n[id],flag:titles.join("、")}});return n});
    setSchResult(sr);setSchReviewing(false);

        </span>
      </div>

          </select>
          {schoolFilter&&<button className="k-nav-btn" onClick={()=>goSchool(SCHOOLS.indexOf(schoolFilter))}>学校単位チェック →</button>}
          <span style={{flex:1}}/>
          <span style={{fontSize:12,color:"#999"}}>{filtered.length}件</span>
        </div>
        <div style={{overflow:"auto"}}>
          <table className="k-table">
            <thead><tr><th className="row-num">#</th><th>ステータス</th><th>受付番号</th><th>学校名</th><th>生徒名漢字</th><th>申請者名漢字</th><th>審査フラグ</th><th>レコード番号</th></tr></thead>
            <tbody>{filtered.map((a,i)=>{const st=appStates[a.id];return(
              <tr key={a.id} onClick={()=>goDetail(a)}>
                <td className="row-num">{i+1}</td>

                <td style={{color:"#999"}}>{a.recNo}</td>

          </table>
        </div>
      </>}

      {/* SCHOOL */}
      {page==="school"&&<>
        <div className="k-nav">
          <span style={{fontWeight:700}}>🏫 {SCHOOLS[schoolIdx]}</span>

            <thead><tr><th className="row-num">#</th><th>ステータス</th><th>受付番号</th><th>生徒名</th><th>学年</th><th>申請者</th><th>続柄</th><th>年間授業料</th><th>審査フラグ</th><th>レコード</th></tr></thead>
            <tbody>{schoolApps.map((a,i)=>{const st=appStates[a.id];const isO=schResult?.some(r=>r.type==="tuit"&&r.ids.includes(a.id));const isD=schResult?.some(r=>r.type==="dup"&&r.ids.includes(a.id));return(
              <tr key={a.id} onClick={()=>goDetail(a)} className={(isO||isD)?"row-highlight":""}>
                <td className="row-num">{i+1}</td>
                <td><span className={`k-status ${stCls[st.status]}`}>{st.status}</span></td>

                <td style={{color:"#999"}}>{a.recNo}</td>

        <KGroup title="申請者住所" fields={[["郵便番号",selApp.address.postalCode],["都道府県",selApp.address.prefecture],["区市町村",selApp.address.city],["町域",selApp.address.town],["丁目・番地",selApp.address.street],["建物名",selApp.address.building||"—"],["自宅電話番号",selApp.address.homePhone||"（未記入）"],["日中連絡先",selApp.address.dayPhone],["連絡先氏名",selApp.address.dayContactName]]} warns={curState?.result?.findings}/>
        <KGroup title="口座情報" fields={[["金融機関名",selApp.bank.bankName],["支店名",selApp.bank.branchName],["預金種目",selApp.bank.accountType],["口座番号",selApp.bank.accountNumber],["名義人姓（カナ）",selApp.bank.holderLastNameKana],["名義人名（カナ）",selApp.bank.holderFirstNameKana]]} warns={curState?.result?.findings}/>
        <KGroup title="授業料・金額" fields={[["年間授業料",selApp.tuition.annual.toLocaleString()+"円"],["決定額",selApp.tuition.determined.toLocaleString()+"円"],["確定額",selApp.tuition.confirmed.toLocaleString()+"円"],["保護者口座振込額",selApp.tuition.transfer.toLocaleString()+"円"],["在籍確認",selApp.enrollment]]} warns={curState?.result?.findings}/>

        <div className="k-group"><div className="k-group-header">📎 添付書類</div><div style={{padding:12,display:"flex",gap:10}}>{selApp.docs.map((d,i)=><div key={i} className="k-doc"><div className="k-doc-preview"><span style={{fontSize:24}}>{DI[d]||"📄"}</span><span style={{fontSize:11,color:"#666",fontWeight:600}}>{d}</span></div></div>)}</div></div>

        {reviewing&&<div className="k-progress"><div style={{display:"flex",alignItems:"center",gap:8}}><Sp/><span style={{fontSize:12,fontWeight:600,color:"#2980b9"}}>{progress<30?"書類をOCR読取中...":progress<60?"Gemini APIで照合中...":progress<90?"分析中...":"結果生成中..."}</span></div><div className="k-progress-bar"><div className="k-progress-fill" style={{width:`${progress}%`}}/></div></div>}

        {error&&<div style={{background:"#fdf0ef",border:"1px solid #f5b7b1",borderRadius:4,padding:12,marginBottom:12,color:"#c0392b",fontSize:12}}>⚠ エラー：{error}</div>}

        {curState?.result&&!reviewing&&<div id="res">
          <div className="k-result-divider"><div className="line"/><div className="label">🤖 AI審査結果（Gemini）</div><div className="line"/></div>
          <div style={{display:"flex",gap:12,marginBottom:12}}>
            <div className="k-score"><div className={`k-score-num ${curState.result.overall!=="OK"?"warn":""}`}>{curState.result.score}</div><div style={{fontSize:10,color:"#999"}}>スコア</div><div style={{marginTop:4}}><span className={`k-status ${curState.result.overall==="OK"?"k-status-approved":"k-status-rejected"}`}>{curState.result.overall}</span></div></div>
            <div className="k-group" style={{flex:1,marginBottom:0}}><div className="k-group-header">🤖 AI総合コメント</div><div style={{padding:12,fontSize:13,lineHeight:1.7}}>{curState.result.summary}</div></div>
          </div>

          <div className="k-group"><div className="k-group-header">🔍 検出事項</div><div style={{padding:10}}>{(curState.result.findings||[]).map((f,i)=><div key={i} className={`k-finding k-finding-${f.severity}`}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}><span className="k-flag" style={{background:f.severity==="error"?"#fdf0ef":f.severity==="warning"?"#fef9f0":"#e8f4fd",color:f.severity==="error"?"#c0392b":f.severity==="warning"?"#e67e22":"#2980b9"}}>{f.severity==="error"?"不整合":f.severity==="warning"?"確認推奨":"情報"}</span><span style={{fontSize:11,color:"#666"}}>{f.category}</span>{f.field&&<span style={{fontSize:10,color:"#999",background:"#f5f6f7",padding:"1px 5px",borderRadius:3}}>{f.field}</span>}</div><div style={{fontSize:12,lineHeight:1.7,color:"#555",paddingLeft:8}}>{f.message}</div></div>)}</div></div>

          {curState.result.matchResults&&<div className="k-group"><div className="k-group-header">📄 OCR照合結果</div><div style={{padding:12}}>
            <div style={{display:"flex",gap:10,marginBottom:12}}>{Object.entries(curState.result.matchResults).map(([k,v])=>{const lb={juuminhyo:"住民票",studentId:"生徒証",bankDoc:"口座書類"};const ok=v==="一致";return<div key={k} className={`k-match ${ok?"k-match-ok":"k-match-ng"}`}><div style={{fontSize:11,color:"#666"}}>{lb[k]}</div><div style={{fontSize:13,fontWeight:700,color:ok?"#27ae60":"#e67e22"}}>{v}</div></div>})}</div>
            <KOcrSub title="住民票" items={[{l:"氏名",v:curState.result.ocr.jN},{l:"住所",v:curState.result.ocr.jA},{l:"発行日",v:curState.result.ocr.jI},{l:"申請者住民日",v:curState.result.ocr.jRA},{l:"生徒住民日",v:curState.result.ocr.jRS}]} members={curState.result.ocr.jM}/>
            <KOcrSub title="生徒証" items={[{l:"氏名",v:curState.result.ocr.sN},{l:"学校名",v:curState.result.ocr.sS},{l:"学年",v:curState.result.ocr.sG}]}/>
            <KOcrSub title="口座書類" items={[{l:"金融機関",v:curState.result.ocr.bB},{l:"支店名",v:curState.result.ocr.bR},{l:"口座番号",v:curState.result.ocr.bNo,x:curState.result.ocr.xN},{l:"名義人",v:curState.result.ocr.bH,x:curState.result.ocr.xH}]}/>
          </div></div>}
        </div>}
        <div style={{height:30}}/>
      </div>}
    </div>
  );
}

function KGroup({title,fields,warns}){
  const[open,setOpen]=useState(true);
  const wf=(warns||[]).filter(w=>w.field).map(w=>w.field);
  return<div className="k-group"><div className="k-group-header" onClick={()=>setOpen(!open)}><span style={{fontSize:10,color:"#999"}}>{open?"▼":"▶"}</span>{title}</div>{open&&<div className="k-group-body">{fields.map(([l,v],i)=>{const hit=wf.some(x=>x&&(l.includes(x)||x.includes(l)));return<div key={i} className={`k-field-row ${hit?"k-field-warn":""}`}><div className="k-field-label">{l}{hit&&" ⚠"}</div><div className="k-field-value">{v}</div></div>})}</div>}</div>
}

function KOcrSub({title,items,members}){
  return<div style={{background:"#fafbfc",border:"1px solid #f0f1f4",borderRadius:4,padding:10,marginBottom:8}}>
    <div style={{fontSize:12,fontWeight:600,color:"#666",marginBottom:6}}>{title}</div>
    {items.map((it,i)=><div key={i} className={`k-field-row ${it.x?"k-field-warn":""}`} style={{borderBottom:"1px solid #f0f1f4"}}><div className="k-field-label" style={{width:120,minWidth:120,fontSize:11}}>{it.l}</div><div className="k-field-value" style={{fontSize:12}}>{it.v}</div></div>)}
    {members&&<div style={{marginTop:6}}><div style={{fontSize:11,fontWeight:600,color:"#666",marginBottom:4}}>世帯員</div><table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}><thead><tr>{["氏名","続柄","生年月日"].map(h=><th key={h} style={{textAlign:"left",padding:"4px 8px",borderBottom:"1px solid #e3e7ee",color:"#999",fontSize:10}}>{h}</th>)}</tr></thead><tbody>{members.map((m,i)=><tr key={i} style={{borderBottom:"1px solid #f0f1f4"}}><td style={{padding:"4px 8px",color:m.x?"#e67e22":"#333",fontWeight:m.x?600:400}}>{m.n}{m.x&&" ⚠"}</td><td style={{padding:"4px 8px",color:"#555"}}>{m.r}</td><td style={{padding:"4px 8px",color:"#555"}}>{m.b}</td></tr>)}</tbody></table></div>}
  </div>
}

function Sp(){return<span style={{display:"inline-block",width:14,height:14,border:"2px solid #a9d4f5",borderTopColor:"#3498db",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
